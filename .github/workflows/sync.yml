name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
          fetch-depth: 0

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.3
        with:
          upstream_sync_repo: DustinWin/ruleset_geodata
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.WORKFLOW_PAT }}
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 自动同步失败。常见原因：1) WORKFLOW_PAT 失效/权限不足 2) 与自定义改动冲突。"
          echo "需要时手动对齐上游并重贴自定义。"
          exit 1
