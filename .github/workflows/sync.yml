name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v7

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.3
        with:
          upstream_sync_repo: DustinWin/ruleset_geodata
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.WORKFLOW_PAT }}
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 自动同步失败。请确认 WORKFLOW_PAT secret 有 repo+workflow 权限，或手动 Sync Fork。"
          exit 1
